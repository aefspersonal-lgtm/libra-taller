<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller Libra</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    background:#000;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    opacity:.9;
}

#mensaje{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<header>
<h1>REPUESTOS Y MANTENCIONES LIBRA LTDA</h1>
<p>Recepción de Vehículos</p>
</header>

<div class="container">

<div class="card">
<h2>Datos del Cliente</h2>

<input id="cliente" type="text" placeholder="Nombre Cliente">
<input id="patente" type="text" placeholder="Patente">
<input id="marca" type="text" placeholder="Marca">
<input id="modelo" type="text" placeholder="Modelo">

<textarea id="observaciones" rows="5" placeholder="Observaciones"></textarea>

<button onclick="guardarRecepcion()">Guardar Recepción</button>

<div id="mensaje"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC33HI5FV3Pe_TItk3omOrF7wDVsGbrSSw",
  authDomain: "libra-taller.firebaseapp.com",
  projectId: "libra-taller",
  storageBucket: "libra-taller.firebasestorage.app",
  messagingSenderId: "744770639303",
  appId: "1:744770639303:web:bd386be5561af5682c75e2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.guardarRecepcion = async function(){

try{

await addDoc(collection(db,"recepciones"),{

cliente: document.getElementById("cliente").value,
patente: document.getElementById("patente").value,
marca: document.getElementById("marca").value,
modelo: document.getElementById("modelo").value,
observaciones: document.getElementById("observaciones").value,
fecha: new Date().toLocaleString()

});

document.getElementById("mensaje").innerHTML =
"✅ Recepción guardada correctamente";

}catch(error){

document.getElementById("mensaje").innerHTML =
"❌ Error: " + error.message;

}

}

</script>

</body>
</html>
