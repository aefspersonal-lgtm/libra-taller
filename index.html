<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller Libra</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    background:#000;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<header>
<h1>REPUESTOS Y MANTENCIONES LIBRA LTDA</h1>
<p>Recepción de Vehículos</p>
</header>

<div class="container">

<div class="card">
<h2>Datos del Cliente</h2>

<input type="text" placeholder="Nombre Cliente">
<input type="text" placeholder="Patente">
<input type="text" placeholder="Marca">
<input type="text" placeholder="Modelo">

<textarea rows="5" placeholder="Observaciones"></textarea>

<button>Guardar Recepción</button>
</div>

</div>

</body>
</html>
